{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-white border border-slate-200 rounded-2xl p-8 text-center shadow-sm">
    <div class="w-16 h-16 bg-red-50 text-red-600 border border-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
        <i class="ph-bold ph-trash text-3xl"></i>
    </div>
    
    <h2 class="text-xl font-bold text-slate-800 mb-2">{{ title|default:"Confirmar Eliminación" }}</h2>
    <p class="text-slate-500 text-sm mb-6">¿Estás seguro de que deseas eliminar <strong class="text-slate-800">{{ object.descripcion }}</strong>? Esta acción no se puede deshacer.</p>

    <form method="post" class="flex gap-4">
        {% csrf_token %}
        <a href="{% url cancel_url %}" class="w-1/2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold py-3 rounded-xl transition">Cancelar</a>
        <button type="submit" class="w-1/2 bg-red-650 hover:bg-red-700 text-white text-sm font-bold py-3 rounded-xl shadow-sm transition">Eliminar</button>
    </form>
</div>
{% endblock %}
