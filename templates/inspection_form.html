{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white border border-slate-200 rounded-2xl p-8 shadow-sm">
    <div class="flex items-center gap-3 mb-6">
        <div class="p-3 bg-indigo-50 text-indigo-600 rounded-xl border border-indigo-100">
            <i class="fa-solid fa-shield text-2xl"></i>
        </div>
        <h2 class="text-xl font-bold text-slate-800">Inspección Física de Vehículo</h2>
    </div>

    <form method="post" id="inspeccionForm" class="space-y-6">
        {% csrf_token %}

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Vehículo a Inspeccionar</label>
                {{ form.vehiculo }}
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Cliente Asociado</label>
                {{ form.cliente }}
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Empleado Evaluador</label>
                {{ form.empleado_inspector }}
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Cantidad Combustible</label>
                {{ form.cantidad_combustible }}
            </div>
        </div>

        <!-- Checklist Física Dinámica con Tailwind -->
        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 space-y-4">
            <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Estado Físico del Vehículo</h4>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                
                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.tiene_ralladuras }}
                    <span class="text-sm font-semibold text-slate-700">¿Tiene Ralladuras?</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.tiene_roturas_cristal }}
                    <span class="text-sm font-semibold text-slate-700">¿Tiene Rotura de Cristales?</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.tiene_goma_repuesto }}
                    <span class="text-sm font-semibold text-slate-700">¿Tiene Goma de Repuesto?</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.tiene_gato }}
                    <span class="text-sm font-semibold text-slate-700">¿Tiene Gato Hidráulico?</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.goma_delantera_izq }}
                    <span class="text-sm font-semibold text-slate-700">Goma Delantera Izq. OK</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.goma_delantera_der }}
                    <span class="text-sm font-semibold text-slate-700">Goma Delantera Der. OK</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.goma_trasera_izq }}
                    <span class="text-sm font-semibold text-slate-700">Goma Trasera Izq. OK</span>
                </label>

                <label class="flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-500/50 transition">
                    {{ form.goma_trasera_der }}
                    <span class="text-sm font-semibold text-slate-700">Goma Trasera Der. OK</span>
                </label>

            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Estado General Inspección</label>
                {{ form.estado }}
            </div>
        </div>

        <div class="flex justify-end gap-4 pt-4 border-t border-slate-100">
            <a href="{% url 'inspeccion_list' %}" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold px-6 py-3 rounded-xl transition">Cancelar</a>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-8 py-3 rounded-xl shadow-sm transition text-sm">Registrar Inspección</button>
        </div>
    </form>
</div>

<script>
    // Style Django Form Inputs Dynamically
    document.querySelectorAll('#inspeccionForm input, #inspeccionForm select, #inspeccionForm textarea').forEach(element => {
        if (element.type !== 'checkbox' && element.type !== 'submit' && element.type !== 'hidden') {
            element.className = 'w-full bg-slate-50 text-slate-800 rounded-xl border border-slate-200 p-2.5 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition';
        } else if (element.type === 'checkbox') {
            element.className = 'w-5 h-5 accent-indigo-600 rounded border-slate-300 bg-slate-50';
        }
    });
</script>
{% endblock %}
